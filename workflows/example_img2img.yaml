# SpriteFlow 示例工作流：图生图（Seedream 5.0 Lite）
# 加载已有素材 → Seedream 风格转换 → 去背景 → 入库

version: 1
name: "Img2Img 图生图（Seedream）"

nodes:
  - id: load
    type: LoadAsset
    params:
      asset_id: "knight_proto_001"

  - id: transform
    type: Img2Img
    inputs:
      image: load.image
    params:
      prompt: "convert to pixel art knight, walking pose, side view, clean transparent background"
      size: "2K"
      output_format: "png"
      watermark: false

  - id: remove_bg
    type: RemoveBG
    inputs:
      image: transform.image

  - id: save
    type: SaveAsset
    inputs:
      image: remove_bg.image
    params:
      source: generated
      tags:
        - "char:knight"
        - "action:walk"
        - "stage:final"
      parent_id: "knight_proto_001"
