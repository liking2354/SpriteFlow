# SpriteFlow 示例工作流：文生图 + 精灵对齐（尺寸统一）
# 文本提示词 → Seedream 出图 → 去背景 → SpriteAlign（居中/缩放/画布适配） → 入库

version: 1
name: "Text2Img + SpriteAlign（尺寸统一）"

nodes:
  - id: generate
    type: Text2Img
    params:
      prompt: >
        a pixel art knight character, fantasy RPG style,
        front view, isolated subject on plain background
      size: "2K"
      output_format: "png"
      watermark: false

  - id: remove_bg
    type: RemoveBG
    inputs:
      image: generate.image

  - id: align
    type: SpriteAlign
    inputs:
      image: remove_bg.image
    params:
      canvas_width: 64
      canvas_height: 64
      target_width: 28
      target_height: 48
      detect_threshold: 32
      padding: 8
      auto_center: "true"
      auto_crop: "true"
      bottom_align: "true"

  - id: save
    type: SaveAsset
    inputs:
      image: align.image
    params:
      source: generated
      tags:
        - "char:knight"
        - "style:pixel"
        - "stage:aligned"
        - "canvas:64x64"
