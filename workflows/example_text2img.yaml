# SpriteFlow 示例工作流：文生图（Seedream 5.0 Lite）
# 文本提示词 → Seedream 出图 → 去背景 → 入库（COS + SQLite）

version: 1
name: "Text2Img 文生图（Seedream）"

nodes:
  - id: generate
    type: Text2Img
    params:
      prompt: "a pixel art knight character, fantasy RPG style, front view, isolated subject on plain background"
      size: "2K"
      output_format: "png"
      watermark: false

  - id: remove_bg
    type: RemoveBG
    inputs:
      image: generate.image

  - id: save
    type: SaveAsset
    inputs:
      image: remove_bg.image
    params:
      source: generated
      tags:
        - "char:knight"
        - "style:pixel"
        - "stage:final"
