# SpriteFlow 示例工作流：多图融合（Seedream 5.0 Lite）
# 给定 2+ 张参考图，融合为一张新图（如：把图1人物穿上图2服装）

version: 1
name: "多图融合（Seedream Multi-Image Fusion）"

nodes:
  - id: fuse
    type: MultiImageFusion
    params:
      prompt: "将图1的人物穿上图2的服装，保持图1的姿势和构图"
      image_urls:
        - "https://ark-project.tos-cn-beijing.volces.com/doc_image/seedream4_imagesToimage_1.png"
        - "https://ark-project.tos-cn-beijing.volces.com/doc_image/seedream4_5_imagesToimage_2.png"
      size: "2K"
      output_format: "png"
      watermark: false

  - id: save
    type: SaveAsset
    inputs:
      image: fuse.image
    params:
      source: generated
      tags:
        - "stage:fusion"
