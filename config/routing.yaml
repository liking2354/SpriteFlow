# SpriteFlow 能力路由配置
# 节点声明 capability，路由层映射到具体 provider

routes:
  text2img: seedream
  img2img: seedream
  multi_image_fusion: seedream
  sequential_images: seedream
  remove_bg: rembg
  enhance_photo: volcengine_image
  image_inpaint: volcengine_image
  image_cut: volcengine_image
  image_outpaint: volcengine_image
  slim_image: volcengine_image
  resize_image: volcengine_image
  # 视频生成 → 火山方舟 Seedance
  text2video: seedance
  img2video: seedance
  # OpenRouter 场景路由：按场景选择最优模型
  character_master: openrouter
  four_view: openrouter

# 主 provider 失败时的回退链
fallback:
  remove_bg:
    - volcengine_image
  text2img:
    - openrouter
  img2img:
    - openrouter
  text2video:
    - openrouter
  img2video:
    - openrouter
  # 场景路由回退：OpenRouter 不可用时降级到 Seedream
  character_master:
    - seedream
  four_view:
    - seedream

# 各 provider 的凭证配置（建议走环境变量）
credentials:
  seedream: ${ARK_API_KEY}
  openrouter: ${OPENROUTER_API_KEY}
