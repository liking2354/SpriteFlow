# SpriteFlow 能力路由配置
# 节点声明 capability，路由层映射到具体 provider

routes:
  text2img: seedream
  img2img: seedream
  multi_image_fusion: seedream
  sequential_images: seedream
  remove_bg: rembg

# 主 provider 失败时的回退链（可补充其他兼容 provider）
fallback: {}

# 各 provider 的凭证配置（建议走环境变量）
credentials:
  seedream: ${ARK_API_KEY}
